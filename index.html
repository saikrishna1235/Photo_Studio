<!DOCTYPE html>
<html>
<head>
  <title>Photo Studio</title>
</head>
<body>

<h1>Gallery</h1>
<div id="gallery"></div>

<script>
const url = "https://raw.githubusercontent.com/saikrishna1235/Photo_Studio/main/data.json";

fetch(url)
  .then(res => res.json())
  .then(data => {
    const gallery = document.getElementById("gallery");

    data.photos.forEach(photo => {
      gallery.innerHTML += `
        <div>
          <h3>${photo.title}</h3>
          <img src="${photo.image}" width="200"/>
          <p>${photo.description}</p>
        </div>
      `;
    });
  });
</script>

</body>
</html>
